<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תרגול למבחן — ניהול מערכות תובלה ושינוע</title>
</head>
<body>
<div id="app" dir="rtl"></div>

<style>
  :root{
    --ink:#16233a; --primary:#1f4e79; --primary-2:#2f6ca8;
    --accent:#e0842c; --good:#1e7a33; --good-bg:#e8f5ec; --bad:#b01a1a; --bad-bg:#fbeaea;
    --ground:#eef1f5; --surface:#ffffff; --line:#d9dfe7; --muted:#5b6675;
    --u1:#1f4e79; --u2:#0f8b8b; --u3:#6a4bb0; --u4:#c9781f; --u5:#1e7a33;
    --shadow:0 1px 2px rgba(22,35,58,.06), 0 8px 24px rgba(22,35,58,.08);
    --radius:14px;
  }
  *{box-sizing:border-box}
  #app{
    font-family:"Segoe UI",-apple-system,"Rubik","Heebo",Arial,sans-serif;
    color:var(--ink); background:
      radial-gradient(1200px 500px at 100% -10%, rgba(31,78,121,.06), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(224,132,44,.06), transparent 55%),
      var(--ground);
    min-height:100vh; line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px; margin:0 auto; padding:20px 16px 60px}
  .btn{font:inherit; cursor:pointer; border:1px solid transparent; border-radius:10px; padding:11px 18px; font-weight:600; transition:transform .08s ease, background .15s, box-shadow .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary); color:#fff; box-shadow:0 6px 16px rgba(31,78,121,.28)}
  .btn-primary:hover{background:var(--primary-2)}
  .btn-ghost{background:var(--surface); color:var(--primary); border-color:var(--line)}
  .btn-ghost:hover{border-color:var(--primary-2); color:var(--primary-2)}
  .btn:focus-visible{outline:3px solid rgba(224,132,44,.5); outline-offset:2px}

  /* ---- Start screen ---- */
  .hero{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
  .hero-top{background:linear-gradient(135deg,#1b3a5c,#1f4e79 55%,#2f6ca8); color:#fff; padding:30px 26px 26px; position:relative}
  .hero-top::after{content:""; position:absolute; inset:0; background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.12) 0 22px, transparent 22px 44px); bottom:0; height:6px; top:auto; opacity:.6}
  .kicker{font-size:12.5px; letter-spacing:.14em; text-transform:uppercase; color:#bcd4ec; font-weight:700; margin-bottom:8px}
  .hero-top h1{margin:0; font-size:29px; font-weight:800; letter-spacing:-.01em; text-wrap:balance}
  .hero-sub{margin:8px 0 0; color:#d5e4f2; font-size:14.5px}
  .hero-body{padding:22px 26px 26px}
  .field-label{font-size:12.5px; font-weight:700; color:var(--muted); letter-spacing:.03em; margin:0 0 9px}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px}
  .chip{border:1px solid var(--line); background:#fff; border-radius:999px; padding:8px 14px; font-size:13.5px; font-weight:600; cursor:pointer; color:var(--ink); display:flex; align-items:center; gap:7px; transition:.15s}
  .chip .dot{width:9px; height:9px; border-radius:50%}
  .chip[aria-pressed="true"]{border-color:var(--primary); background:rgba(31,78,121,.08); color:var(--primary)}
  .chip:focus-visible{outline:3px solid rgba(224,132,44,.5); outline-offset:2px}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 15px; border:1px solid var(--line); border-radius:11px; margin-bottom:22px; background:#fbfcfd}
  .toggle-row .t-txt{font-size:13.5px}
  .toggle-row .t-txt b{display:block; font-size:14.5px}
  .switch{position:relative; width:48px; height:27px; flex:none}
  .switch input{opacity:0; width:0; height:0}
  .slider{position:absolute; inset:0; background:#c3ccd6; border-radius:999px; transition:.2s; cursor:pointer}
  .slider::before{content:""; position:absolute; height:21px; width:21px; right:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider::before{transform:translateX(-21px)}
  .start-meta{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap}
  .start-meta .count{color:var(--muted); font-size:13.5px}

  /* ---- Quiz header ---- */
  .qhead{position:sticky; top:0; z-index:5; background:rgba(238,241,245,.86); backdrop-filter:blur(8px); padding:12px 16px; border-bottom:1px solid var(--line); margin:-20px -16px 18px}
  .qhead-in{max-width:760px; margin:0 auto; display:flex; align-items:center; gap:12px}
  .progress{flex:1; height:8px; background:#dbe2ea; border-radius:999px; overflow:hidden}
  .progress > i{display:block; height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:999px; transition:width .35s cubic-bezier(.4,0,.2,1)}
  .counter{font-size:13px; font-weight:700; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap}
  .score-chip{display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:5px 11px; font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--good)}

  /* ---- Question card ---- */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; animation:pop .25s ease}
  @keyframes pop{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  .badge{display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; letter-spacing:.02em; color:#fff; padding:4px 11px; border-radius:999px; margin-bottom:14px}
  .badge-prof{background:#fff4e2 !important; color:#a35a12; border:1px solid #f0cf9a; margin-inline-start:7px}
  .scenario{background:#f4f7fa; border:1px solid #e5ebf1; border-right:3px solid var(--primary); border-radius:8px; padding:12px 14px; font-size:14.5px; color:#374559; margin-bottom:14px}
  .qtext{font-size:18px; font-weight:700; line-height:1.5; margin:0 0 16px; text-wrap:balance}
  .opts{display:flex; flex-direction:column; gap:10px}
  .opt{display:flex; align-items:flex-start; gap:11px; text-align:right; width:100%; background:#fff; border:1.5px solid var(--line); border-radius:11px; padding:13px 14px; font:inherit; font-size:15px; cursor:pointer; transition:.14s; color:var(--ink)}
  .opt:hover:not(:disabled){border-color:var(--primary-2); background:#f7fafd}
  .opt:disabled{cursor:default}
  .opt:focus-visible{outline:3px solid rgba(224,132,44,.5); outline-offset:2px}
  .opt .lt{flex:none; width:26px; height:26px; border-radius:7px; background:#eef2f6; color:var(--muted); font-weight:800; font-size:14px; display:grid; place-items:center; transition:.14s}
  .opt .ot{padding-top:2px}
  .opt.correct{border-color:var(--good); background:var(--good-bg)}
  .opt.correct .lt{background:var(--good); color:#fff}
  .opt.wrong{border-color:var(--bad); background:var(--bad-bg)}
  .opt.wrong .lt{background:var(--bad); color:#fff}
  .mark{margin-inline-start:auto; font-weight:800; align-self:center; font-size:17px}
  .opt.correct .mark{color:var(--good)}
  .opt.wrong .mark{color:var(--bad)}

  .explain{margin-top:15px; border-radius:11px; padding:14px 15px; font-size:14.5px; line-height:1.55; animation:pop .3s ease; border:1px solid}
  .explain.ok{background:var(--good-bg); border-color:#bfe3c9}
  .explain.no{background:var(--bad-bg); border-color:#eecccc}
  .explain b{display:block; margin-bottom:4px; font-size:13.5px; letter-spacing:.02em}
  .explain.ok b{color:var(--good)} .explain.no b{color:var(--bad)}
  .nav{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:18px}
  .hint{color:var(--muted); font-size:13px}

  /* ---- Results ---- */
  .result{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:0; overflow:hidden; text-align:center}
  .result-top{padding:32px 24px 26px; color:#fff; background:linear-gradient(135deg,#1b3a5c,#1f4e79 60%,#2f6ca8)}
  .ring{--v:0; width:132px; height:132px; border-radius:50%; margin:6px auto 14px; display:grid; place-items:center;
    background:conic-gradient(var(--accent) calc(var(--v)*1%), rgba(255,255,255,.22) 0)}
  .ring i{width:104px; height:104px; border-radius:50%; background:#1c3f61; display:grid; place-items:center; font-size:30px; font-weight:800; font-variant-numeric:tabular-nums; font-style:normal}
  .result-top h2{margin:0; font-size:23px; font-weight:800}
  .result-top p{margin:6px 0 0; color:#d5e4f2; font-size:14.5px}
  .breakdown{padding:22px 24px}
  .bd-row{display:grid; grid-template-columns:1fr auto; gap:6px 12px; align-items:center; margin-bottom:13px}
  .bd-name{font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px}
  .bd-name .dot{width:10px;height:10px;border-radius:50%}
  .bd-val{font-size:13px; font-weight:700; color:var(--muted); font-variant-numeric:tabular-nums}
  .bd-bar{grid-column:1 / -1; height:8px; background:#e5eaf0; border-radius:999px; overflow:hidden}
  .bd-bar > i{display:block; height:100%; border-radius:999px}
  .result-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:4px 24px 26px}
  .foot{text-align:center; color:var(--muted); font-size:12.5px; margin-top:22px}
</style>

<script>
const QUESTIONS = [
{u:1,s:"עיר גדולה סובלת מעומסי תנועה בשעות השיא. מהנדס התנועה מודד בכביש עורקי מהירות ממוצעת של 40 קמ\"ש וצפיפות של 50 רכבים לק\"מ.",q:"לפי מודל זרימת התנועה, מהי הזרימה (q) בקטע זה?",o:["2,000 רכבים לשעה — לפי q = S × D","0.8 רכבים לשעה — לפי q = S / D","90 רכבים לשעה — לפי q = S + D","לא ניתן לחשב ללא נתון הקיבולת"],a:0,e:"נוסחת היסוד של זרימת תנועה: q = S × D = 40 × 50 = 2,000 רכבים/שעה. הזרימה היא מכפלת המהירות בצפיפות."},
{u:1,s:"חברת שילוח מעבירה מכולה מסין לישראל: משאית לנמל, אונייה לנמל חיפה, ומשאית לחנות.",q:"כיצד נכנה את שלב מעבר המכולה מהאונייה למשאית בנמל היעד, במונחי אינטר-מודליות?",o:["INTERCHANGE — נקודת מעבר בין אמצעי תובלה (TRANSFER)","COMPOSITION — איסוף ראשוני (First mile)","DECOMPOSITION — פירוק וחלוקה סופית","רמת מינוע"],a:0,e:"מודל האינטר-מודליות: COMPOSITION (איסוף) ← INTERCHANGE (מעבר/TRANSFER בין אמצעים) ← DECOMPOSITION (חלוקה). המעבר מאונייה למשאית הוא INTERCHANGE."},
{u:1,s:"בכביש הררי נמדדת תנועה מעורבת של מכוניות פרטיות ומשאיות כבדות. המתכנן רוצה להעריך את העומס האמיתי על הדרך.",q:"מדוע משתמשים ביחידת רכב משווה (יר\"מ / PCU)?",o:["כדי להמיר סוגי רכב שונים ליחידה אחידה — משאית בהר \"שווה\" למספר מכוניות","כדי למדוד את המהירות המרבית המותרת","כדי לחשב את רמת המינוע של המדינה","כדי לקבוע את מחיר הדלק לק\"מ"],a:0,e:"יר\"מ ממיר רכבים שונים ליחידות אחידות לפי השפעתם על הזרימה. משאית תופסת ומאטה תנועה יותר ממכונית — בהר מקדם ההמרה שלה גבוה במיוחד."},
{u:2,s:"רשות מקומית שומרת מפה: שכבה אחת מיוצגת כפוליגונים עם קואורדינטות X,Y מדויקות; שכבה אחרת היא תצלום אוויר המחולק לרשת תאים אחידה.",q:"כיצד נכנה את שני אופני ייצוג הנתונים בהתאמה?",o:["וקטור (פוליגונים) וראסטר (תאים)","ראסטר (פוליגונים) ווקטור (תאים)","שניהם וקטור","שניהם ראסטר"],a:0,e:"וקטור מייצג ישויות בדידות בעזרת נקודות/קווים/פוליגונים עם קואורדינטות. ראסטר מייצג את המרחב ברשת תאים (הרזולוציה = גודל התא). תצלום אוויר = ראסטר."},
{u:2,s:"מקלט GPS בטלפון מנסה לקבוע את מיקומו המדויק במרחב (אורך, רוחב וגובה).",q:"מדוע נדרשים לפחות 4 לוויינים לקביעת המיקום?",o:["יש 4 נעלמים (x, y, z והזמן t) ולכן צריך 4 משוואות","כי יש 4 מישורי מסלול","כי כל לוויין מכסה רבע כדור הארץ","כדי לגבות זה את זה במקרה תקלה"],a:0,e:"המיקום נקבע בטריאנגולציה. מלבד 3 קואורדינטות המרחב (x,y,z), גם הזמן t הוא נעלם (סטיית שעון המקלט), ולכן דרושות 4 משוואות = 4 לוויינים."},
{u:2,s:"חברת הפצה רוצה לראות בכל רגע היכן נמצאות המשאיות שלה על מפה, לאתר את הקרובה ביותר ללקוח, ולקבל התראה כשמשאית יוצאת מאזור מוגדר.",q:"באיזו טכנולוגיה מדובר?",o:["AVL — שילוב של GPS (מיקום) עם GIS (מפה)","RFID בלבד","ראסטר","Cross-docking"],a:0,e:"AVL (Automatic Vehicle Location) = GPS + GIS: איתור אוטומטי של כלי רכב, הצגה על מפה, שילוח דינמי והתראות geofencing."},
{u:2,s:"מתכנן ערים רוצה לדעת אילו חלקות קרקע נמצאות במרחק של עד 50 מטר מכביש ראשי, כדי להעריך חשיפה לרעש.",q:"באיזה סוג ניתוח GIS מדובר?",o:["ניתוח קרבה (Proximity)","ניתוח שכבות-על (Overlay)","ניתוח רשת (Network)","תשאול (Query)"],a:0,e:"ניתוח קרבה בוחן מרחק ממאפיין (טווח/חוצץ). Overlay מצליב שכבות; Network מנתח מסלולים לאורך רשת."},
{u:3,s:"חברה מפעילה 3 מפעלים (היצע כולל 300 יח') ו-4 לקוחות (ביקוש כולל 250 יח'). מבקשים לבנות מודל תובלה למזעור עלויות.",q:"מה קורה למבנה הפתרון האופטימלי כאשר סך ההיצע גדול מסך הביקוש?",o:["המודל לא פתיר, כי היצע וביקוש חייבים להיות שווים","ערך פונקציית המטרה יהפוך לשלילי","יש להוסיף לקוח (יעד) פיקטיבי כך שהביקוש ישווה להיצע, בעלות 0","כל הספקים ישלחו את מלוא הקיבולת ללקוח הזול ביותר"],a:2,e:"בעיה לא מאוזנת (היצע>ביקוש). מוסיפים לקוח/יעד פיקטיבי שסופג את העודף (50 יח') עם עלויות הובלה 0 — וכך מאזנים. הבעיה נשארת פתירה."},
{u:3,s:"בעיה דומה, אך הפעם סך הביקוש של הלקוחות (400) גדול מסך ההיצע של הספקים (350).",q:"כיצד מאזנים את בעיית התובלה במקרה זה?",o:["מוסיפים ספק (מקור) פיקטיבי שמספק את החוסר, בעלות 0","מוסיפים לקוח פיקטיבי","מוחקים את הלקוח עם הביקוש הגבוה ביותר","מכפילים את ההיצע של כל ספק"],a:0,e:"כשהביקוש גדול מההיצע, החוסר (50) מסופק ע\"י ספק/מקור פיקטיבי בעלות 0. סימטרי למקרה ההפוך: היצע>ביקוש ← יעד פיקטיבי."},
{u:3,s:"חברה מעבירה סחורה ממפעלים ללקוחות, אך המשלוחים חייבים לעבור דרך מרכזי מיון (מרלו\"ג) שבהם הסחורה נכנסת ויוצאת בדרך ליעד.",q:"מהו ההבדל העיקרי בין בעיית תובלה לבעיית שיטעון?",o:["בשיטעון קיימים קודקודי מעבר (נקודות ביניים), בעוד שבתובלה המשלוח ישיר ממקור ליעד","תובלה נפתרת בסולבר ושיטעון באלגוריתם יוריסטי","שיטעון מניח ביקוש שלילי ותובלה חיובי","אין הבדל — אלו שמות שונים לאותה בעיה"],a:0,e:"ההבחנה המרכזית: שיטעון כולל קודקודי מעבר שבהם מתקיים שימור זרימה (נכנס=יוצא), בעוד בתובלה הסחורה עוברת ישירות מספק ללקוח."},
{u:3,s:"בבעיית שיטעון, מרלו\"ג משמש כנקודת מעבר בלבד — הסחורה לא נשארת בו אלא ממשיכה ללקוחות.",q:"איזה תנאי מתקיים בקודקוד המעבר?",o:["שימור זרימה — סך הזרימה הנכנסת שווה לסך הזרימה היוצאת (מאזן 0)","הזרימה הנכנסת תמיד כפולה מהיוצאת","הקודקוד צורך את כל הסחורה","הקודקוד מייצר סחורה חדשה"],a:0,e:"בקודקוד מעבר מתקיים שימור זרימה: כל מה שנכנס יוצא (מאזן = 0). מניחים גם קיבולת מעבר גדולה מאוד כדי שהסחורה תוכל לזרום דרכו."},
{u:3,s:"מפקדה צבאית צריכה להעריך כמה כוחות ניתן להעביר בו-זמנית מבסיס עורפי (S) לחזית (T) דרך רשת כבישים, כשלכל כביש קיבולת מרבית.",q:"באיזו בעיית רשת מדובר, ומהו הקשר החשוב שלה?",o:["זרימה מקסימלית (Max Flow); ערכה שווה לערך החתך המינימלי (Min Cut)","בעיית התובלה; הפתרון תמיד שלילי","מסלול קצר ביותר; נפתר בדייקסטרה","בעיית שיבוץ; היצע=ביקוש=1"],a:0,e:"מקסום כמות הזרימה בין S ל-T בכפוף לקיבולות = Max Flow. משפט Max-Flow/Min-Cut: הזרימה המקסימלית שווה לחתך המינימלי (צוואר הבקבוק של הרשת)."},
{u:3,s:"מפעל צריך לשבץ 4 מהנדסים ל-4 פרויקטים, כך שכל מהנדס יקבל פרויקט אחד וכל פרויקט יאויש ע\"י מהנדס אחד, בעלות כוללת מינימלית.",q:"איזו בעיה מתאימה, וכיצד היא קשורה לבעיית התובלה?",o:["בעיית שיבוץ (Assignment) — מקרה פרטי של תובלה שבו כל היצע=1 וכל ביקוש=1","בעיית מחלק הדואר — מעבר בכל הקשתות","בעיית מיקום מתקנים","זרימה מקסימלית"],a:0,e:"בעיית השיבוץ היא מקרה פרטי של בעיית התובלה שבו כל ההיצעים וכל הביקושים שווים ל-1 (התאמה 1:1), עם משתנים בינאריים."},
{u:4,s:"רשת מזון עוברת למודל Just-In-Time (JIT): מלאי מינימלי בחנויות ואספקה תכופה במנות קטנות.",q:"כיצד משפיע המעבר ל-JIT על החלטת מיקום מרכזי ההפצה של החברה?",o:["המודל יאלץ למקם את המחסנים קרוב ללקוחות, לאספקה מהירה, תכופה ואמינה","החברה תרחיק את המחסנים מעבר לים כדי להוזיל עלויות","המחסנים ימוקמו היכן שהתנועה מגיעה למקסימום","ההחלטה תיקבע לפי קרבה לצינורות גז ונפט"],a:0,e:"ב-JIT אין מלאי חוצץ שסופג עיכובים, ולכן נדרשת אספקה מהירה ואמינה — מה שמחייב קרבה גיאוגרפית ללקוח. מרחק גדול הורס את היכולת לספק \"בדיוק בזמן\"."},
{u:4,s:"חקלאי שוקל היכן למקם מחסן בין החווה לשוק. ככל שמתרחקים מהשוק, עלות ההובלה עולה אך מחיר הקרקע יורד.",q:"היכן תהיה נקודת המיקום בעלת העלות הכוללת המינימלית?",o:["בנקודת ביניים המאזנת בין עלות התובלה לעלות הקרקע — לא הכי קרוב ולא הכי רחוק","דווקא הכי קרוב לשוק, שם עלות התובלה מינימלית","דווקא הכי רחוק מהשוק, שם הקרקע זולה ביותר","המיקום אינו משפיע על העלות הכוללת"],a:0,e:"עקומת העלות הכוללת בצורת U: עלות תובלה עולה עם המרחק וערך הקרקע יורד. המינימום מתקבל בנקודת ביניים, לא בקצוות."},
{u:4,s:"עירייה ממקמת תחנות כיבוי אש. חלופה א' ממזערת את סך המרחק המשוקלל לכלל השכונות; חלופה ב' ממזערת את המרחק לשכונה הרחוקה ביותר.",q:"כיצד נכנה את שני המודלים בהתאמה?",o:["P-Median (סכום משוקלל) ו-Max-Min (הלקוח המרוחק ביותר)","Max-Min ו-P-Median","שניהם P-Median","שניהם כיסוי מקסימלי"],a:0,e:"P-Median ממזער את סך המרחק המשוקלל בביקוש (מטרת עלות כוללת). Max-Min ממזער את המרחק ללקוח הגרוע/המרוחק ביותר (מטרת שירות והוגנות)."},
{u:4,s:"רשת בתי קפה רוצה למקם מספר מוגבל של סניפים כך שכמה שיותר לקוחות (משוקלל בביקוש) יהיו בטווח הליכה של 500 מ' מסניף.",q:"איזה מודל מיקום מתאים?",o:["כיסוי מקסימלי (Maximal Covering) — מקסום הביקוש המכוסה בתוך טווח נתון","P-Median","Max-Min","גבול הפצה"],a:0,e:"מודל הכיסוי המקסימלי ממקסם את סך הביקוש המכוסה בתוך טווח כיסוי Dc, בהינתן מספר מתקנים מוגבל P."},
{u:4,s:"חברה בוחנת מיקום מחסן לפי שתי מטרות מנוגדות: מזעור עלות הובלה ומזעור פגיעה בשכונות מגורים, ומציירת אוסף פתרונות.",q:"מהי \"חזית פארטו\" (Pareto Front) במקרה זה?",o:["אוסף הפתרונות הלא-נשלטים — שבהם אי אפשר לשפר מטרה בלי לפגוע באחרת","הפתרון היחיד שממזער את שתי המטרות בו-זמנית","הפתרון היקר ביותר","נקודת האמצע הגיאומטרית בין הלקוחות"],a:0,e:"בבעיה רב-מטרתית אין בד\"כ פתרון יחיד אופטימלי. חזית פארטו היא אוסף הפתרונות הלא-נשלטים; נקודה \"מתחת\" לחזית נשלטת (נחותה) ולכן פסולה."},
{u:5,s:"נהג משאית מחפש את הדרך הקצרה ביותר מנקודת מוצא ליעד ברשת כבישים. כל המרחקים (משקלים) חיוביים.",q:"מתי מובטח שאלגוריתם דייקסטרה ייתן פתרון אופטימלי, ומתי לא?",o:["מובטח אופטימום כל עוד אין קשתות בעלות משקל שלילי; עם משקל שלילי הוא עלול להיכשל","מובטח אופטימום תמיד, בכל מקרה","מובטח אופטימום רק בגרף לא מכוון","לעולם אינו נותן אופטימום — רק קירוב"],a:0,e:"דייקסטרה הוא אלגוריתם חמדני המבטיח אופטימום רק כאשר כל המשקלים אי-שליליים. קשת עם משקל שלילי עלולה לשבש את הבחירה החמדנית."},
{u:5,s:"בקורס נלמד שדייקסטרה הוא אלגוריתם \"חמדני\" (Greedy).",q:"מהי משמעות גישה חמדנית, ומה תכונתה?",o:["בכל צעד בוחרים את הטוב ביותר מקומית; לעיתים אופטימום (דייקסטרה) ולעיתים רק קירוב (TSP)","בכל צעד בודקים את כל האפשרויות העתידיות ובוחרים גלובלית","בוחרים אפשרות אקראית בכל צעד","תמיד מבטיח את הפתרון האופטימלי בכל בעיה"],a:0,e:"אלגוריתם חמדני בוחר אופטימום מקומי בכל צעד בלי לשקול את העתיד. במסלול קצר (דייקסטרה, ללא שליליים) זה מבטיח אופטימום; ב-TSP רק פתרון סביר."},
{u:5,s:"חברת שירות מתכננת מסלול לטכנאי שיבקר ב-15 לקוחות פעם אחת כל אחד ויחזור למשרד, בזמן נסיעה כולל מינימלי.",q:"כיצד מסווגים בעיה זו ומדוע משתמשים בהיוריסטיקה?",o:["בעיית הסוכן הנוסע (TSP), NP-Hard — אין אלגוריתם יעיל לאופטימום, ולכן היוריסטיקות","בעיית מסלול קצר ביותר, שנפתרת אופטימלית בדייקסטרה","בעיית שיבוץ, שנפתרת בקלות","בעיית זרימה מקסימלית"],a:0,e:"ביקור בכל הקודקודים פעם אחת וחזרה = מעגל המילטוני מינימלי = TSP. בעיה NP-Hard (מספר מסלולים פקטוריאלי), ולכן משתמשים בהיוריסטיקות כמו \"השכן הקרוב\"."},
{u:5,s:"לפתרון TSP משתמשים באלגוריתם \"השכן הקרוב ביותר\" (Nearest Neighbor).",q:"מה ניתן להבטיח לגבי איכות הפתרון (S_alg) ביחס לאופטימום (S_opt)?",o:["S_opt ≤ S_alg ≤ 2·S_opt — לעולם לא גרוע מפי 2 מהאופטימום, אך לא בהכרח אופטימלי","S_alg תמיד שווה ל-S_opt","S_alg תמיד גדול פי 10 מ-S_opt","אין שום חסם על איכות הפתרון"],a:0,e:"אלגוריתם השכן הקרוב הוא היוריסטיקה חמדנית. החסם הידוע: S_opt ≤ S_alg ≤ 2·S_opt — פתרון מהיר וסביר, אך לא בהכרח אופטימלי."},
{u:5,s:"רשות מקומית מתכננת מסלול לרכב טאטוא רחובות שיעבור בכל הרחובות (הכבישים) בשכונה, במרחק כולל מינימלי.",q:"באיזו בעיה מדובר, ומה מבדיל אותה מבעיית הסוכן הנוסע?",o:["מחלק הדואר הסיני — מעבר בכל הקשתות (כבישים); ב-TSP עוברים בכל הקודקודים","בעיית הסוכן הנוסע — זהות לחלוטין","בעיית שיבוץ","זרימה מקסימלית"],a:0,e:"מחלק הדואר = מעגל מינימלי העובר בכל הקשתות (כבישים). זו ההבחנה מ-TSP שעובר בכל הקודקודים. טאטוא/איסוף אשפה = קשתות ← מחלק הדואר."},
{u:5,s:"חברת הפצה מפעילה מחסן מרכזי וצי משאיות בעלות קיבולת קבועה, ומחלקת סחורה ל-40 לקוחות בעלי דרישות ידועות, בעלות מינימלית.",q:"באיזו בעיה מדובר ובאיזה עיקרון פועל אלגוריתם ה-Savings לפתרונה?",o:["ניתוב רכבים (VRP); מחברים מסלולים לפי החיסכון Sij = Ci0 + C0j − Cij, מהגבוה לנמוך, בכפוף לקיבולת","מסלול קצר ביותר; דייקסטרה","בעיית שיבוץ; התאמה 1:1","זרימה מקסימלית; פורד-פולקרסון"],a:0,e:"שיבוץ צי רכבים ללקוחות תחת אילוץ קיבולת = VRP. אלגוריתם Savings (Clarke & Wright) מתחיל ממסלול נפרד לכל לקוח ומחבר זוגות עם החיסכון הגבוה ביותר שעומד באילוצי הקיבולת."},
{u:5,s:"חברה נערכת לחירום ורוצה לתכנן מראש כמה מסלולי פינוי חלופיים, למקרה שהמסלול המועדף לא יהיה זמין.",q:"איזה מושג מתאר את מה שהחברה מחפשת?",o:["K-Shortest Paths — K המסלולים הקצרים ביותר, כדי שיהיו חלופות מוכנות","זרימה מקסימלית","חתך מינימלי","חציון משוקלל"],a:0,e:"כשרוצים לא רק את המסלול הקצר ביותר אלא גם חלופות (למקרה שהמסלול הראשי חסום), מחפשים את K המסלולים הקצרים ביותר (K-Shortest Paths)."},

{u:3,prof:true,s:"בעיות תובלה.",q:"מה קורה למבנה הפתרון האופטימלי כאשר סך ההיצע של כל הספקים גדול מסך הביקוש של כל הלקוחות?",o:["המודל הופך ללא פתיר מכיוון שהמודל מחייב שהביקוש וההיצע יהיו שווים","ערך פונקציית מטרה תהפוך לשלילית מכיוון שהעודפים מוגדרים כרווח","יש להוסיף קודקוד יעד פיקטיבי שהביקוש שלו שווה להפרש","כל הספקים ישלחו את מלוא הקיבולת שלהם ללקוח בעל העלות הנמוכה ביותר"],a:2,e:"כשיש בעיה לא מאוזנת (אין שוויון בין הדרישה להיצע) — בהתאם למה שיש יותר, מוסיפים לקוח פיקטיבי או ספק פיקטיבי בהתאם לזה שהוא קולט או מספק. כאן היצע>ביקוש → יעד (לקוח) פיקטיבי שביקושו שווה להפרש, בעלות 0."},
{u:3,prof:true,s:"בעיות תובלה.",q:"מה ההבדל המהותי בין בעיית הובלה לבעיית שיטעון?",o:["בעיית הובלה פותרים עם אלגוריתמים היוריסטיים ושיטעון עם סולבר בלבד","בעיית שיטעון פותרים עם אלגוריתמים היוריסטיים והובלה עם סולבר בלבד","בבעיית שיטעון עלויות ההובלה בין המוצא ליעד קבועות ולא תלויות בנפח","בעיית שיטעון מתעלמת מאילוצי קיבולת ומניחה שלכל מתקני הביניים יש שטח אחסון אינסופי","בבעיית הובלה הזרימה מתבצעת ישירות מקודקוד מקור לקודקוד יעד, ובבעיית שיטעון יש קודקודי ביניים שבהם סך הזרימה הנכנסת חייבת להיות שווה ליוצאת"],a:4,e:"ההבדל המהותי: בשיטעון קיימים קודקודי ביניים (מעבר) שבהם מתקיים שימור זרימה — נכנס=יוצא. בהובלה הזרימה ישירה ממקור ליעד. (הנחת שטח האחסון האינסופי בצמתי מעבר היא הנחת מודל טכנית, אך אינה ההבדל המהותי.)"},
{u:4,prof:true,s:"מיקום מתקנים.",q:"כיצד משפיע מעבר של חברה למודל אספקה מבוסס Just-In-Time על החלטת מיקום המחסנים שלה ביחס למפעלי הלקוחות?",o:["החברה תרחיק את המחסנים למדינות מעבר לים כדי לנצל עלויות אחסון זולות ולמקסם מלאי בטיחות","המודל יאלץ את מיקום המחסנים להיות קרוב גיאוגרפית ללקוחות כדי להבטיח זמינות מיידית וכמות משלוחים גבוהה","המחסנים ימוקמו בנקודות שבהן נפח התנועה בכבישים מגיע למקסימום","ההחלטה תהיה תלויה אך ורק במיקום צינורות גז ונפט לאומיים ללא קשר למיקומי הלקוחות"],a:1,e:"JIT דורש אספקה מיידית, תכופה ואמינה ללא מלאי חוצץ — ולכן מחייב מיקום מחסנים קרוב גיאוגרפית ללקוחות."},
{u:5,prof:true,s:"מסלול קצר ביותר.",q:"אלגוריתם דייקסטרה — מדוע הוא לא עובד כאשר יש קשתות בעלות משקל שלילי?",o:["האלגוריתם מבוסס על אסטרטגיה חמדנית שמניחה שברגע שקודקוד סומן כקבוע המרחק אליו מינימלי; אם קיים משקל שלילי בהמשך הרשת שעשוי להציע מרחק קצר יותר, האלגוריתם כבר לא יעדכן קודקודים כאלה","משקל שלילי גורם לאלגוריתם להיתקע בלולאה אינסופית בקודקוד המקור","האלגוריתם יהפוך את הגרף ללא כשיר ויחלק את רשת הכבישים לתתי-גרפים","מספר הקשתות יקטן וזה יגרום לחתך המינימלי להיות גדול מהזרימה המקסימלית"],a:0,e:"דייקסטרה חמדני: ברגע שקודקוד \"ננעל\" כקבוע הוא מניח שהמרחק אליו סופי ומינימלי. קשת שלילית מאוחרת יכולה לפתוח מסלול קצר יותר, אך האלגוריתם כבר לא יחזור לעדכן — ולכן עלול לטעות."},
{u:5,prof:true,s:"מסלול קצר ביותר.",q:"חברת שליחויות מעוניינת למצוא לא רק את המסלול הקצר ביותר, אלא את K המסלולים הקצרים ביותר. מה הערך התפעולי של גישה זו?",o:["צמצום שלב ה-Last Mile","הבטחה מתמטית שכל המסלולים יעברו דרך אותן קשתות בדיוק","המרת בעיית ניתוב מבעיית NP-קשה לבעיית תכנון לינארי רגילה","מתן חלופות גיבוי מוגדרות מראש למקרה של תאונות או חסימות"],a:3,e:"K-Shortest Paths נותן סט מסלולים חלופיים מוכנים מראש, כך שאם המסלול הקצר ביותר חסום (תאונה/חסימה) עוברים מיד לבא בתור."},
{u:5,prof:true,s:"סוכן נוסע מול מסלול קצר.",q:"בעיית הסוכן הנוסע ובעיית המסלול הקצר ביותר — מה ההבדל ביניהן?",o:["בבעיית הסוכן הנוסע חובה לעבור בכל קודקודי הגרף ולחזור לנקודת המוצא, ובבעיית המסלול הקצר מחפשים נתיב אופטימלי בין שני קודקודים ולא חובה לעבור בכל היתר","בעיית הסוכן הנוסע ניתנת לפתרון אופטימלי בזמן פולינומי מהיר ובעיית המסלול הקצר היא NP-קשה","בבעיית הסוכן הנוסע המשקולות מייצגות רק נפחי תנועה ויר\"מ ולא מרחקים או זמנים","בבעיית הסוכן הנוסע מניחים שכל כלי הרכב בעלי קיבולת מוגבלת ומחייבים פריקה במספר מסופי ביניים"],a:0,e:"סוכן נוסע = מעגל שעובר בכל הקודקודים פעם אחת וחוזר להתחלה (NP-קשה). מסלול קצר = נתיב אופטימלי בין שני קודקודים בלבד (נפתר בקלות בדייקסטרה)."},
{u:5,prof:true,s:"סוכן נוסע מול ניתוב רכבים.",q:"איזה אילוץ מתווסף כאשר עוברים מבעיית הסוכן הנוסע לבעיית ניתוב רכבים (VRP)?",o:["חיוב של כל משאית לעבור דרך החתך המינימלי","אילוץ שמחייב את כל כלי הרכב לנוע רק ברשת בלתי מכוונת","מגבלת הקיבולת של כלי הרכב, שמאלצת אותנו להשתמש במספר כלי רכב במספר מסלולים","ביטול כל המשתנים השלמים במודל והפיכתו למערכת משוואות לינאריות"],a:2,e:"בסוכן נוסע אין קיבולת רכב (רכב אחד יכול לבקר בכל הלקוחות). ב-VRP מתווספת מגבלת קיבולת — לא ניתן להבטיח שמשאית אחת תכסה את כל הלקוחות, ולכן צריך מספר רכבים ומספר מסלולים."},
{u:5,prof:true,s:"ניתוב רכבים.",q:"אלגוריתמים לניתוב רכבים מחולקים לשיטות מדויקות ולשיטות היוריסטיות. מדוע עבור צי המשרת 150 לקוחות מנהל הלוגיסטיקה יעדיף כמעט תמיד שיטה היוריסטית?",o:["מכיוון ששיטות מדויקות אינן מסוגלות לטפל באילוצים פשוטים כמו קיבולת ועלויות נסיעה","שיטות היוריסטיות מבטיחות להגיע לאופטימום מוחלט ב-100% מהמקרים","מכיוון ש-VRP היא בעיה NP-קשה, פתרון מדויק ל-150 לקוחות דורש זמן עצום, ואילו שיטה היוריסטית נותנת פתרון קרוב תוך שניות/דקות","שיטות מדויקות אינן ישימות לכלי רכב שנוסעים בכבישים"],a:2,e:"VRP היא בעיה NP-קשה — פתרון מדויק ל-150 לקוחות דורש זמן חישוב עצום (בלתי מעשי). היוריסטיקה מוותרת על ודאות האופטימום תמורת פתרון טוב \"מספיק\" במהירות."},

{u:1,s:"מתכנן תחבורה משווה בין כביש מהיר בין-עירוני לבין רחוב מקומי בשכונת מגורים.",q:"מהי התכונה המבחינה בין 'דרך מהירה' ל'דרך מקומית' בסיווג הדרכים?",o:["דרך מהירה = זרימה גבוהה ונגישות נמוכה; דרך מקומית = נגישות גבוהה וזרימה נמוכה","דרך מהירה מספקת גם זרימה גבוהה וגם נגישות גבוהה","דרך מקומית מיועדת למשאיות בלבד","אין הבדל תפקודי — רק הבדל במהירות המותרת"],a:0,e:"קיים trade-off בין זרימה לנגישות: דרך גבוהה בהיררכיה (מהירה) נותנת זרימה גבוהה אך נגישות נמוכה; דרך מקומית — נגישות גבוהה (כניסה לבתים) וזרימה נמוכה."},
{u:1,s:"מהנדס בוחן את הקיבולת המרבית (יר\"מ/נתיב/שעה) של סוגי דרכים שונים.",q:"לאיזה סוג דרך הקיבולת הגבוהה ביותר?",o:["דרך מהירה","דרך עורקית","דרך מאספת","דרך מקומית"],a:0,e:"סדר הקיבולת: מהירה (~2000) > עורקית (~1500) > מאספת (~750) > מקומית (~250) יר\"מ/נתיב/שעה. דרך גבוהה יותר בהיררכיה = קיבולת גבוהה יותר."},
{u:1,s:"בעקומת הזרימה-צפיפות, ככל שהצפיפות עולה מאפס הזרימה עולה, מגיעה לשיא ואז יורדת עד לפקק מלא (Dj).",q:"באיזו צפיפות מתקבלת הזרימה המקסימלית (qmax)?",o:["בצפיפות מחצית מצפיפות הפקק: D = Dj/2","בצפיפות אפס","בצפיפות הפקק המלא: D = Dj","בצפיפות המקסימלית האפשרית של הכביש"],a:0,e:"בעקומה הפרבולית q(D) הזרימה המקסימלית מתקבלת ב-D = Dj/2. בצפיפות 0 אין רכבים (q=0); בצפיפות פקק Dj המהירות 0 (q=0)."},
{u:1,s:"חברת אנרגיה צריכה להעביר נפט גולמי לאורך מאות ק\"מ בין שדה קידוח לבית זיקוק, ברציפות ובעלות נמוכה.",q:"איזה אמצעי תובלת מטען מתאים ביותר, וייחודי למטען (לא לנוסעים)?",o:["צנרת (Pipeline)","רכבת","אונייה","מטוס מטען"],a:0,e:"צנרת היא אמצעי תובלת מטען בלבד (נפט/גז/מים), להעברה רציפה בעלות נמוכה. מופיעה בסיווג המטען אך לא בסיווג הנוסעים."},
{u:2,s:"במסד נתונים שמורים שני שדות: השם 'ישראל ישראלי', והכתובת 'הרצל 23, תל אביב'.",q:"איזה מהם נחשב לנתון גאוגרפי?",o:["הכתובת — כי ניתן למקם אותה על פני כדור הארץ ברשת קואורדינטות","השם — כי הוא מזהה אדם","שניהם גאוגרפיים","אף אחד מהם אינו גאוגרפי"],a:0,e:"נתון גאוגרפי מיוחס למיקום על כדור הארץ (רשת קואורדינטות) — הכתובת. השם אינו מרחבי כלל. כל גאוגרפי הוא מרחבי, אך לא להפך."},
{u:2,s:"מנהל פרויקט GIS מבלבל בין 'מרכיבי המערכת' לבין 'שלבי התהליך'.",q:"מהם חמשת מרכיבי מערכת GIS?",o:["כח אדם, נתונים, תוכנה, חומרה, פרוצדורות","איסוף, אחסון, תשאול, ניתוח, תצוגה","וקטור, ראסטר, נקודה, קו, פוליגון","קרבה, שכבות-על, רשת, תשאול, פלט"],a:0,e:"5 מרכיבי GIS: כח אדם, נתונים, תוכנה, חומרה, פרוצדורות. אין לבלבל עם שלבי התהליך (איסוף→אחסון→תשאול→ניתוח→תצוגה→פלט)."},
{u:2,s:"אנליסט GIS מצליב שלוש שכבות — סוג קרקע, בעלות על המבנה, וסוג הבאר — כדי לזהות אזורים העונים על כל התנאים יחד.",q:"באיזה סוג ניתוח מדובר?",o:["ניתוח שכבות-על (Overlay)","ניתוח קרבה (Proximity)","ניתוח רשת (Network)","עיגון תמונה (Georeferencing)"],a:0,e:"Overlay מצליב מספר שכבות באותו מרחב לקבלת מידע משולב. קרבה = מרחק ממאפיין; רשת = מסלולים לאורך קווים."},
{u:2,s:"אמבולנס צריך למצוא את המסלול המהיר ביותר מבית החולים למקום התאונה לאורך רשת הכבישים.",q:"באיזה סוג ניתוח GIS מדובר?",o:["ניתוח רשת (Network)","ניתוח קרבה (Proximity)","ניתוח שכבות-על (Overlay)","תשאול (Query)"],a:0,e:"ניתוח רשת מחשב מסלולים וזמני נסיעה לאורך רשת קווית (כבישים). שונה מקרבה (טווח) ומ-Overlay (הצלבת שכבות)."},
{u:2,s:"קרטוגרף בוחר בין מפה בקנה מידה 1:500 למפה בקנה מידה 1:250,000 לאותו אזור.",q:"איזו טענה נכונה לגבי קנה המידה?",o:["1:500 הוא קנה מידה גדול יותר ומציג יותר פירוט; עיר עשויה להופיע בו כפוליגון","1:250,000 מציג יותר פירוט כי המספר גדול יותר","שתי המפות מציגות בדיוק אותו פירוט","קנה המידה אינו משפיע על אופן ייצוג הישויות"],a:0,e:"מספר קטן יותר במכנה = קנה מידה גדול יותר = יותר פירוט. ב-1:500 עיר עשויה להיות פוליגון; ב-1:250,000 (קנ\"מ קטן) אותה עיר עשויה להיות נקודה."},
{u:2,s:"בעיר צפופה עם בניינים גבוהים המסתירים לוויינים, טלפון חכם מתקשה לקבל 'נעילת' GPS ראשונית מהירה.",q:"איזו טכנולוגיה נועדה לפתור זאת?",o:["AGPS (Assisted GPS) — שרת עזר שמזרז את זמן הנעילה הראשונה (TTFF)","AVL","ראסטר","RFID"],a:0,e:"AGPS משתמש בשרת-עזר (בעיקר במכשירים סלולריים) לספק נתוני לוויינים ולזרז את הנעילה הראשונה (TTFF), במיוחד באזורים עירוניים."},
{u:2,s:"רוצים להטמיע תצלום אוויר (ראסטר) שאינו מכיל מידע גאוגרפי בתוך מערכת GIS, כך שיתאים למיקום האמיתי בשטח.",q:"איזה תהליך נדרש?",o:["עיגון תמונה (Georeferencing) — התאמת התמונה לקואורדינטות בעולם האמיתי","וקטוריזציה","ניתוח קרבה","טריאנגולציה"],a:0,e:"עיגון תמונה ממקם תמונת ראסטר במערכת הקואורדינטות של העולם האמיתי (גודל תא, סיבוב, נקודת ייחוס E/N)."},
{u:3,s:"באלגוריתם פורד-פולקרסון לזרימה מקסימלית בונים רשת שיורית ומוסיפים לכל קשת גם קשת חוזרת (בכיוון הנגדי).",q:"מה מטרת הקשתות החוזרות?",o:["לאפשר 'לבטל' זרימה שהוקצתה בצעד קודם ולנתב אותה מחדש, כדי להגיע לאופטימום","להכפיל את קיבולת הרשת","למנוע לולאות אינסופיות","להפוך את הגרף ללא מכוון"],a:0,e:"הקשתות החוזרות מאפשרות לתקן הקצאת זרימה שגויה מצעד קודם ולנתב מחדש. בלעדיהן האלגוריתם עלול להיתקע בפתרון לא אופטימלי."},
{u:3,s:"רוצים למצוא את החתך המינימלי (Min Cut) — קבוצת הקשתות שמחיקתן מנתקת את המקור מהיעד, בערך מינימלי.",q:"כיצד מוצאים אותו, ומהו הקשר לזרימה?",o:["פותרים תחילה זרימה מקסימלית; ערך החתך המינימלי שווה לה, והקשתות הרוויות הן החתך","מוחקים את הקשת היקרה ביותר בגרף","מחפשים את המסלול הקצר ביותר בין המקור ליעד","סוכמים את כל קיבולות הקשתות בגרף"],a:0,e:"משפט Max-Flow/Min-Cut: ערך החתך המינימלי = הזרימה המקסימלית. מוצאים אותו ע\"י פתרון הזרימה המקסימלית; הקשתות הרוויות (זרימה=קיבולת) מהוות את צוואר הבקבוק = החתך."},
{u:3,s:"בבעיית זרימה מקסימלית קיימים כמה מקורות אספקה וכמה יעדים, במקום מקור יחיד ויעד יחיד.",q:"כיצד מטפלים במצב זה?",o:["מוסיפים מקור-על ויעד-על המחוברים לכל המקורות/היעדים בקיבולת אינסופית","פותרים בעיה נפרדת לכל זוג מקור-יעד","מוחקים את כל המקורות פרט לאחד","הופכים את הבעיה לבעיית שיבוץ"],a:0,e:"מוסיפים מקור-על המחובר לכל המקורות ויעד-על המחובר לכל היעדים, בקשתות קיבולת אינסופית — וכך מצמצמים לבעיית מקור/יעד יחיד."},
{u:3,s:"בבעיית זרימה כללית מסמנים לכל קודקוד ערך מאזן: חיובי, שלילי או אפס.",q:"מה משמעות הסימון?",o:["חיובי = מקור (היצע); שלילי = יעד (ביקוש); אפס = קודקוד מעבר","חיובי = יעד; שלילי = מקור; אפס = חסום","חיובי = עלות גבוהה; שלילי = עלות נמוכה","הסימן מציין רק את כיוון הקשת"],a:0,e:"מוסכמת הסימנים: מאזן חיובי = מקור/היצע, מאזן שלילי = יעד/ביקוש, מאזן 0 = קודקוד מעבר (נכנס=יוצא)."},
{u:4,s:"מרכז לוגיסטי מעביר סחורה כמעט מיד מעמדת הפריקה לעמדת הטעינה של משאיות היוצאות ללקוחות, כמעט ללא אחסון.",q:"כיצד נכנה שיטת עבודה זו?",o:["Cross-docking (שטעון) — מעבר סחורה ללא אחסון","מחסן אחסון ארוך-טווח","מלאי בטיחות","נמל עורפי"],a:0,e:"Cross-docking = מעבר סחורה ישירות מפריקה לטעינה ללא (או כמעט ללא) אחסון. שונה ממחסן שנועד לאחסון."},
{u:4,s:"חברה ממקמת מחסן יחיד המשרת לקוחות בעלי ביקושים (משקלים) שונים, ורוצה למזער את עלות השינוע. המרחקים נמדדים לאורך צירים (Rectilinear).",q:"כיצד נקבע המיקום האופטימלי?",o:["לפי החציון המשוקלל בכל ציר בנפרד (X ואז Y) — לא הממוצע!","לפי הממוצע החשבוני של מיקומי הלקוחות","לפי הלקוח עם הביקוש הגבוה ביותר בלבד","לפי מרכז הריבוע החוסם את כל הלקוחות"],a:0,e:"בפתרון מיקום מתקן יחיד ב-Rectilinear, המיקום האופטימלי לכל ציר הוא החציון המשוקלל (הנקודה שבה המשקל המצטבר עובר את מחצית סך המשקל) — ולא הממוצע."},
{u:4,s:"לקוח נמצא בין המפעל לבין מרכז הפצה. מנקודה מסוימת ואילך זול יותר לספק לו ממרכז ההפצה מאשר ישירות מהמפעל.",q:"כיצד נקבעת נקודת המעבר (גבול ההפצה)?",o:["בנקודה שבה עלות האספקה משני המקורות שווה","בנקודה האמצעית הגיאומטרית בין המפעל למרכז","תמיד במרכז ההפצה, ללא תלות בעלות","לפי הלקוח הרחוק ביותר בלבד"],a:0,e:"גבול ההפצה הוא נקודת שוויון העלויות — המקום שבו עלות האספקה מהמפעל שווה לעלות מהמרכז. משם והלאה כדאי לספק מהמקור הזול יותר."},
{u:4,s:"חברת תעופה מרכזת טיסות דרך מספר נמלי-על מרכזיים, ומהם מפעילה 'חישורים' לשדות תעופה משניים.",q:"כיצד נכנה מבנה רשת זה ומה יתרונו?",o:["Hub & Spokes — רשת היררכית המאפשרת קונסולידציה (איחוד) יעיל של תנועה","רשת 'שתי וערב' מלאה בין כל הצמתים","בעיית מחלק הדואר","חתך מינימלי"],a:0,e:"Hub & Spokes = רשת היררכית עם מרכזי-על (Hubs) וחישורים (Spokes). יעילה לקונסולידציה של תנועה בתעופה ובשילוח."},
{u:4,s:"מודדים מרחק בין מתקן ללקוחות בעיר הבנויה כרשת רחובות מלבנית (כמו מנהטן), שבה אי אפשר לנסוע באלכסון בין הבניינים.",q:"איזו מדידת מרחק מתאימה?",o:["Rectilinear — לאורך הצירים (X ו-Y בנפרד), כמו מנהטן","Euclidean — קו אווירי ישר","מרחק אפס","מרחק אקראי"],a:0,e:"ברשת רחובות מלבנית נעים לאורך הצירים בלבד, ולכן המרחק הוא Rectilinear (מנהטן). Euclidean (קו ישר/אווירי) לא מתאים כי אי אפשר לחצות בניינים."},
{u:5,s:"בבעיית ניתוב מגדירים 'מעגל המילטוני'.",q:"מהו מעגל המילטוני?",o:["מסלול מעגלי העובר בכל קודקודי הגרף פעם אחת בדיוק וחוזר לקודקוד ההתחלה","מסלול העובר בכל קשתות הגרף פעם אחת","המסלול הקצר ביותר בין שני קודקודים","כל מסלול בגרף שלם"],a:0,e:"מעגל המילטוני עובר בכל הקודקודים פעם אחת וחוזר להתחלה — זו ההגדרה של פתרון TSP. (לעומת מחלק הדואר שעובר בכל הקשתות.)"},
{u:5,s:"סטודנט חושב שאלגוריתם דייקסטרה מחשב מסלול קצר רק בין קודקוד מוצא אחד לקודקוד יעד אחד.",q:"מהי התכונה הנכונה של דייקסטרה?",o:["הוא מוצא בבת אחת את המסלולים הקצרים מקודקוד המוצא לכל שאר הקודקודים בגרף","הוא מוצא מסלול רק בין שני קודקודים ספציפיים","הוא עובד רק בגרף שלם","הוא מוצא את המעגל הקצר ביותר"],a:0,e:"דייקסטרה הוא single-source: מקודקוד מוצא אחד הוא מוצא בו-זמנית את המסלולים הקצרים לכל שאר הקודקודים (בגרף עם 6 קודקודים — 5 מסלולים)."},
{u:5,s:"חברת הפצה נדרשת לספק לכל לקוח בתוך טווח שעות מוסכם מראש, ולא בכל שעה שנוחה לה.",q:"איזו הרחבה של בעיית ניתוב הרכבים מתוארת?",o:["חלונות זמן (Time Windows)","בעיית מחלק הדואר","זרימה מקסימלית","K-Shortest Paths"],a:0,e:"חלונות זמן = אילוץ שהגעה ללקוח תהיה בטווח זמן שנקבע מראש (קשיח/גמיש/מרובה). הרחבה נפוצה של VRP."},
{u:5,s:"עיריית תל אביב מתכננת מסלול לרכב פינוי אשפה שיעבור בכל רחובות השכונה; מנהל אחר מתכנן מסלול למפקח שיבקר בכל הצמתים המסוכנים.",q:"אילו בעיות מתאימות בהתאמה?",o:["פינוי אשפה = מחלק הדואר (כל הקשתות); ביקור בצמתים = סוכן נוסע (כל הקודקודים)","שתיהן בעיות סוכן נוסע","שתיהן בעיות מחלק הדואר","פינוי אשפה = מסלול קצר; ביקור צמתים = זרימה מקסימלית"],a:0,e:"מעבר בכל הרחובות (קשתות) = מחלק הדואר. ביקור בכל הצמתים (קודקודים) = סוכן נוסע. ההבחנה: קשתות מול קודקודים."},
{u:5,s:"חברת הפצה שוקלת להסב את צי המשאיות לרכבים חשמליים, ומגלה שעליה להתחשב במיקום תחנות הטעינה בתכנון המסלולים.",q:"איזו הרחבה של בעיית ניתוב הרכבים מתאימה?",o:["E-VRP (Electric VRP) — ניתוב רכבים חשמליים בהתחשב בתחנות טעינה","בעיית שיבוץ","חתך מינימלי","P-Median"],a:0,e:"E-VRP הוא ענף של Green-VRP המטפל בניתוב רכבים חשמליים, ומחייב התייחסות למיקום ולזמינות תחנות הטעינה לאורך המסלול."},

{u:1,s:"בעקומת זרימת התנועה, הזרימה המקסימלית היא 1000 רכבים/שעה. בשעה מסוימת נמדדה זרימה של 500 רכבים/שעה (שאינה זרימת השיא).",q:"כמה ערכי צפיפות ומהירות מתאימים לזרימה של 500?",o:["שתי צפיפויות ושתי מהירויות — לכל ערך זרימה (מלבד השיא) יש שני פתרונות","צפיפות אחת ומהירות אחת בלבד","אינסוף פתרונות","אף פתרון — 500 קטן מדי"],a:0,e:"עקומת q(D) פרבולית: כל ערך זרימה (למעט qmax בשיא) מתקבל בשתי צפיפויות שונות — נמוכה (זרימה חופשית) וגבוהה (לקראת פקק) — ולכן גם שתי מהירויות. רק בשיא יש פתרון יחיד."},
{u:1,s:"מנהל לוגיסטיקה משלב מלגזה, משאית ורכבת לאורך אותו מסלול הפצה, במקום להשתמש רק במשאית.",q:"מהי המטרה העיקרית של שינוע רב-אמצעי (Inter-modality)?",o:["הפצה יעילה יותר — לא בהכרח זולה או מהירה יותר","תמיד הפצה זולה יותר","תמיד הפצה מהירה יותר","ביטול הצורך במחסני ביניים"],a:0,e:"אינטר-מודליות = שילוב אמצעי הובלה לאורך המסלול לשם הפצה יעילה יותר. לא בהכרח הזול או המהיר ביותר — לעיתים דווקא יקר/איטי יותר, אך יעיל בהיבט הכולל."},
{u:1,s:"חבילה מחו\"ל מגיעה במטוס למרכז ההפצה בארץ, ומשם צריכה להגיע ללקוח בודד שביתו בנקודה מרוחקת וקשה להגעה.",q:"כיצד נכנה את אתגר השלב האחרון — מנקודת ההפצה עד ללקוח עצמו?",o:["בעיית המייל האחרון (Last Mile)","אינטר-מודליות","רמת מינוע","שיטעון"],a:0,e:"'המייל האחרון' (Last Mile) — הבאת המשלוח מנקודת ההפצה האחרונה עד ללקוח הסופי. לרוב החלק היקר והמורכב ביותר, כי הלקוחות מפוזרים ולחלקם קשה להגיע."},
{u:2,s:"רוצים לצייר בית קלאסי (ריבוע עם 'איקס' וגג משולש) בלי להרים את העיפרון ובלי לעבור על קו פעמיים — מסלול אוילר שעובר בכל קשת בדיוק פעם אחת.",q:"מהו התנאי לקיום מסלול כזה בגרף קשיר?",o:["בדיוק 0 או 2 קודקודים בעלי דרגה אי-זוגית","כל הקודקודים בדרגה אי-זוגית","מספר הקודקודים זוגי","מספר הקשתות שווה למספר הקודקודים"],a:0,e:"מסלול אוילר (מעבר בכל קשת פעם אחת) קיים בגרף קשיר רק אם יש 0 קודקודים אי-זוגיים (מסלול מעגלי) או בדיוק 2 (מתחילים באחד ומסיימים בשני)."},
{u:2,s:"בבעיית הגשרים של קניגסברג חיפשו מסלול מעגלי שעובר בכל 7 הגשרים בדיוק פעם אחת, ואויילר הוכיח שאי אפשר.",q:"מדוע לא ניתן היה למצוא מסלול כזה?",o:["מכיוון שהיו קודקודים בדרגה אי-זוגית (לא 0 ולא 2 בלבד) ולכן התנאי למסלול אוילר לא התקיים","מכיוון שהיו יותר מדי גשרים","מכיוון שהנהר חצה את העיר","מכיוון שהגרף לא היה קשיר"],a:0,e:"אויילר תרגם את העיר לגרף (יבשות=קודקודים, גשרים=קשתות). מסלול מעגלי בכל קשת פעם אחת דורש שכל הקודקודים בדרגה זוגית; בקניגסברג היו קודקודים אי-זוגיים ולכן בלתי אפשרי."},
{u:4,s:"מוכר גלידה בוחר היכן להתמקם בחוף. באפשרות אחת הוא חופשי לעמוד בכל נקודה לאורך החוף; באפשרות שנייה מותר לו רק במספר עמדות שהוגדרו מראש.",q:"כיצד נכנה את שני סוגי המודלים בהתאמה?",o:["רציף (כל נקודה) מול בדיד (מנקודות מוגדרות מראש)","בדיד מול רציף","שניהם רציפים","שניהם בדידים"],a:0,e:"מודל רציף — המתקן יכול להתמקם בכל נקודה במרחב. מודל בדיד — רק ממספר מיקומים מוגדרים מראש שצריך לבחור ביניהם."},
{u:4,s:"צריך להקים מרלו\"ג במרחק שלא יעלה על 100 ק\"מ מכל לקוח. המיקומים האפשריים הם A, B, C בלבד, ונמצא ש-A רחוק 120 ק\"מ מ-C.",q:"מה המסקנה?",o:["במודל בדיד ייתכן שאין פתרון שעומד באילוץ; במודל רציף אפשר היה למקם בדיוק בנקודת 100 ק\"מ","תמיד יש פתרון בדיד","המרחק אינו רלוונטי","צריך למקם ב-A כי הוא הראשון"],a:0,e:"במודל בדיד מוגבלים לנקודות קיימות, ולכן ייתכן שאף אחת לא עומדת באילוץ (120>100) ואין פתרון. במודל רציף אפשר למקם בדיוק בנקודה שמקיימת את 100 ק\"מ."},
{u:4,s:"רוצים לוודא שכל הלקוחות נמצאים במרחק סביר ממרלו\"ג, אך אין מערכת GIS מדויקת ולכן מעריכים את המרחק.",q:"איזו טענה נכונה לגבי שיטות הערכת המרחק?",o:["קו אווירי (אוקלידי) נותן הערכת חסר (קצר מהמציאות); מדידה לאורך צירים (X ואז Y) נותנת הערכה מחמירה (ארוכה יותר)","קו אווירי תמיד ארוך מהמציאות","מדידה לאורך צירים נותנת הערכת חסר","כל השיטות נותנות בדיוק אותו מרחק"],a:0,e:"קו אווירי ישר קצר מהמסלול האמיתי בכביש → הערכת חסר. מדידה לאורך צירים (רוחב ואז אורך, כמו מנהטן) ארוכה יותר → הערכה מחמירה. מדידה מפורשת ב-GIS היא המדויקת."},
{u:4,s:"חברת הפצה A יודעת מראש בדיוק כמה כל לקוח יזמין בכל יום. חברה B לא יודעת — הכמות משתנה אקראית, וידועות רק ההסתברות וסטיית התקן.",q:"כיצד נסווג את שתי הבעיות בהתאמה?",o:["דטרמיניסטית (A) מול סטוכסטית (B)","סטוכסטית (A) מול דטרמיניסטית (B)","שתיהן דטרמיניסטיות","שתיהן סטטיות"],a:0,e:"בעיה דטרמיניסטית — כל הנתונים ידועים וקבועים (קל יותר לתכנן). בעיה סטוכסטית — יש אקראיות; יודעים רק התפלגות/הסתברות ולא ערכים מדויקים, מה שמקשה על תכנון."},
{u:5,s:"פיצרייה מקבלת הזמנות באופן רציף לאורך הערב — לא יודעים מראש מי יזמין ומתי, וההזמנות נכנסות תוך כדי הנסיעות.",q:"כיצד נסווג את בעיית הניתוב הזו?",o:["בעיה דינאמית — המידע מתעדכן בזמן אמת ולכן אי אפשר לבנות מסלול קבוע מראש","בעיה סטטית — הכל ידוע מראש","בעיית מסלול קצר ביותר","בעיית מחלק הדואר"],a:0,e:"בבעיה דינאמית ההזמנות/הנתונים משתנים תוך כדי, ולכן לא ניתן לבנות מסלול קבוע מראש — צריך לעדכן בזמן אמת. בבעיה סטטית הכל ידוע מראש."},
{u:5,s:"כדי למצוא בוודאות את הפתרון האופטימלי לבעיית הסוכן הנוסע, מחשב מייצר את כל המסלולים האפשריים, מחשב את אורך כל אחד ובוחר את הקצר.",q:"כיצד נקראת גישה זו ומה חסרונה?",o:["Brute Force ('כוח גס') — מובטח אופטימלי אך בלתי מעשי כי מספר המסלולים גדל בקצב עצרתי עצום","היוריסטיקת השכן הקרוב — מהירה ומדויקת","אלגוריתם דייקסטרה","גישה חמדנית — תמיד אופטימלית"],a:0,e:"Brute Force בודק את כל האפשרויות ומבטיח אופטימום, אך מספר המסלולים גדל בקצב עצרתי (סופר-אקספוננציאלי) — כבר ב-10 ערים ~מיליוני מסלולים — ולכן בלתי מעשי. לכן משתמשים בהיוריסטיקות."},
{u:5,s:"מריצים את אלגוריתם 'השכן הקרוב ביותר' על אותה בעיית סוכן נוסע, אך פעם מתחילים מקודקוד אחד ופעם מקודקוד אחר.",q:"מה צפוי לקרות?",o:["ייתכן שנקבל מסלול סופי שונה לחלוטין — נקודת ההתחלה משפיעה על התוצאה","התוצאה תמיד זהה ללא תלות בנקודת ההתחלה","האלגוריתם לא יעבוד אם משנים נקודת התחלה","נקבל תמיד את הפתרון האופטימלי"],a:0,e:"מכיוון שהשכן הקרוב חמדני, בחירה מוקדמת משפיעה על ההמשך. שינוי נקודת ההתחלה יכול להוביל למסלול מעגלי שונה לחלוטין (ולרוב לא אופטימלי) — אף שהוא עדיין מבקר בכל הנקודות."},
{u:5,s:"מתכנן מסלולי הפצה משווה בין רשת של כבישים חד-סטריים לרשת של כבישים דו-סטריים.",q:"איזו טענה נכונה לגבי מורכבות בעיית הניתוב?",o:["רשת דו-סטרית מורכבת וקשה יותר לפתרון, כי ההלוך שונה מהחזור ולמעשה מכפילה את הרשת","רשת חד-סטרית מורכבת יותר","אין הבדל במורכבות","רשת דו-סטרית תמיד חסרת פתרון"],a:0,e:"בכביש דו-סטרי כל קטע מתפצל לשני כיוונים (הלוך≠חזור), מה שמכפיל את מספר הקשתות ומגדיל את מורכבות הבעיה. רשת חד-סטרית פשוטה יותר."}
];

const UNITS = {
  1:{name:"מבוא לתובלה ושינוע", color:"var(--u1)", hex:"#1f4e79"},
  2:{name:"מידע מרחבי", color:"var(--u2)", hex:"#0f8b8b"},
  3:{name:"זרימה ברשתות", color:"var(--u3)", hex:"#6a4bb0"},
  4:{name:"מיקום מתקנים", color:"var(--u4)", hex:"#c9781f"},
  5:{name:"ניתוב רכבים", color:"var(--u5)", hex:"#1e7a33"}
};
const LETTERS = ["א","ב","ג","ד","ה"];
const app = document.getElementById("app");

let state = { pool:[], idx:0, score:0, answered:false, chosen:null, selectedUnits:new Set([1,2,3,4,5]), shuffle:true, profOnly:false, log:[] };
const PROF_COUNT = QUESTIONS.filter(q=>q.prof).length;

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function renderStart(){
  const counts = {}; QUESTIONS.forEach(q=>counts[q.u]=(counts[q.u]||0)+1);
  const chips = Object.entries(UNITS).map(([u,info])=>{
    const on = state.selectedUnits.has(+u);
    return `<button class="chip" role="button" aria-pressed="${on}" data-unit="${u}">
      <span class="dot" style="background:${info.hex}"></span>${info.name} <span style="color:var(--muted);font-weight:600">(${counts[u]||0})</span></button>`;
  }).join("");
  const total = state.profOnly ? PROF_COUNT : QUESTIONS.filter(q=>state.selectedUnits.has(q.u)).length;
  app.innerHTML = `<div class="wrap">
    <div class="hero">
      <div class="hero-top">
        <div class="kicker">בר-אילן · ד״ר אורן נחום</div>
        <h1>תרגול למבחן — תובלה ושינוע</h1>
        <p class="hero-sub">שאלות יישום בסגנון המבחן · משוב מיידי והסבר לכל שאלה</p>
      </div>
      <div class="hero-body">
        <label class="toggle-row" for="prof" style="border-color:#f0cf9a;background:#fff9f0">
          <span class="t-txt"><b>⭐ רק שאלות המרצה (${PROF_COUNT})</b>השאלות המדויקות שהמרצה הראה בכיתה</span>
          <span class="switch"><input type="checkbox" id="prof" ${state.profOnly?"checked":""}><span class="slider"></span></span>
        </label>
        <div id="unitBlock" style="${state.profOnly?'opacity:.4;pointer-events:none':''}">
          <p class="field-label">בחר יחידות לתרגול</p>
          <div class="chips" id="chips">${chips}</div>
        </div>
        <label class="toggle-row" for="shf">
          <span class="t-txt"><b>ערבוב שאלות</b>סדר אקראי בכל סבב תרגול</span>
          <span class="switch"><input type="checkbox" id="shf" ${state.shuffle?"checked":""}><span class="slider"></span></span>
        </label>
        <div class="start-meta">
          <span class="count" id="cnt">${total} שאלות נבחרו</span>
          <button class="btn btn-primary" id="startBtn" ${total?"":"disabled"}>התחל תרגול ←</button>
        </div>
      </div>
    </div>
    <p class="foot">${QUESTIONS.length} שאלות · מתוכן ${PROF_COUNT} שאלות מרצה ⭐ · מבוסס על המצגות והקלטות הזום</p>
  </div>`;

  document.getElementById("prof").addEventListener("change", e=>{ state.profOnly = e.target.checked; renderStart(); });

  document.getElementById("chips").addEventListener("click", e=>{
    const b = e.target.closest(".chip"); if(!b) return;
    const u = +b.dataset.unit;
    if(state.selectedUnits.has(u)) state.selectedUnits.delete(u); else state.selectedUnits.add(u);
    renderStart();
  });
  document.getElementById("shf").addEventListener("change", e=>{ state.shuffle = e.target.checked; });
  document.getElementById("startBtn").addEventListener("click", startQuiz);
}

function shuffleOptions(q){
  // randomize option order each session and remap the correct index — removes positional bias
  const order = shuffle(q.o.map((_,i)=>i));
  return {...q, o: order.map(i=>q.o[i]), a: order.indexOf(q.a)};
}
function startQuiz(){
  let pool = state.profOnly ? QUESTIONS.filter(q=>q.prof) : QUESTIONS.filter(q=>state.selectedUnits.has(q.u));
  if(!pool.length) return;
  if(state.shuffle) pool = shuffle(pool);
  pool = pool.map(shuffleOptions);
  state.pool = pool; state.idx=0; state.score=0; state.answered=false; state.chosen=null; state.log=[];
  renderQuestion();
}

function renderQuestion(){
  const q = state.pool[state.idx];
  const info = UNITS[q.u];
  const pct = Math.round((state.idx)/state.pool.length*100);
  const opts = q.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="lt">${LETTERS[i]}</span><span class="ot">${o}</span></button>`).join("");
  app.innerHTML = `<div class="wrap">
    <div class="qhead"><div class="qhead-in">
      <span class="counter">שאלה ${state.idx+1}/${state.pool.length}</span>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <span class="score-chip">✓ ${state.score}</span>
    </div></div>
    <div class="card">
      <span class="badge" style="background:${info.hex}">יחידה ${q.u} · ${info.name}</span>${q.prof?'<span class="badge badge-prof">⭐ שאלת מרצה</span>':''}
      <div class="scenario">${q.s}</div>
      <p class="qtext">${q.q}</p>
      <div class="opts" id="opts">${opts}</div>
      <div id="fb"></div>
      <div class="nav" id="nav"><span class="hint">בחר/י תשובה</span></div>
    </div>
  </div>`;
  document.getElementById("opts").addEventListener("click", onAnswer);
}

function onAnswer(e){
  if(state.answered) return;
  const btn = e.target.closest(".opt"); if(!btn) return;
  const chosen = +btn.dataset.i;
  const q = state.pool[state.idx];
  state.answered = true; state.chosen = chosen;
  const correct = chosen === q.a;
  if(correct) state.score++;
  state.log.push({u:q.u, correct});

  document.querySelectorAll(".opt").forEach(o=>{
    const i = +o.dataset.i; o.disabled = true;
    if(i === q.a){ o.classList.add("correct"); o.insertAdjacentHTML("beforeend",'<span class="mark">✓</span>'); }
    else if(i === chosen){ o.classList.add("wrong"); o.insertAdjacentHTML("beforeend",'<span class="mark">✗</span>'); }
  });
  document.getElementById("fb").innerHTML =
    `<div class="explain ${correct?"ok":"no"}"><b>${correct?"נכון!":"לא נכון — התשובה הנכונה: "+LETTERS[q.a]}</b>${q.e}</div>`;
  const last = state.idx === state.pool.length-1;
  document.getElementById("nav").innerHTML =
    `<span class="hint">${state.score} מתוך ${state.idx+1} עד כה</span>
     <button class="btn btn-primary" id="nextBtn">${last?"סיום וסיכום ←":"הבא ←"}</button>`;
  document.getElementById("nextBtn").addEventListener("click", ()=>{
    if(last){ renderResults(); } else { state.idx++; state.answered=false; state.chosen=null; renderQuestion(); window.scrollTo({top:0,behavior:"smooth"}); }
  });
  document.getElementById("nextBtn").focus();
}

function renderResults(){
  const total = state.pool.length, pct = Math.round(state.score/total*100);
  let msg = pct>=85?"מצוין! אתה מוכן למבחן 💪":pct>=65?"יפה מאוד — עוד חזרה קטנה ואתה שם":"כדאי לחזור על החומר ולנסות שוב";
  const byU = {}; state.log.forEach(l=>{ (byU[l.u]=byU[l.u]||{c:0,t:0}); byU[l.u].t++; if(l.correct)byU[l.u].c++; });
  const rows = Object.keys(byU).sort().map(u=>{
    const d=byU[u], p=Math.round(d.c/d.t*100), info=UNITS[u];
    return `<div class="bd-row">
      <div class="bd-name"><span class="dot" style="background:${info.hex}"></span>יחידה ${u} · ${info.name}</div>
      <div class="bd-val">${d.c}/${d.t}</div>
      <div class="bd-bar"><i style="width:${p}%;background:${info.hex}"></i></div>
    </div>`;
  }).join("");
  app.innerHTML = `<div class="wrap">
    <div class="result">
      <div class="result-top">
        <div class="ring" style="--v:${pct}"><i>${pct}%</i></div>
        <h2>${state.score} מתוך ${total}</h2>
        <p>${msg}</p>
      </div>
      <div class="breakdown">
        <p class="field-label" style="text-align:right">פירוט לפי יחידה</p>
        ${rows}
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" id="again">תרגול חדש ←</button>
        <button class="btn btn-ghost" id="home">חזרה למסך הפתיחה</button>
      </div>
    </div>
    <p class="foot">בהצלחה במבחן! 📚</p>
  </div>`;
  document.getElementById("again").addEventListener("click", startQuiz);
  document.getElementById("home").addEventListener("click", renderStart);
  window.scrollTo({top:0,behavior:"smooth"});
}

renderStart();
</script>

</body>
</html>
